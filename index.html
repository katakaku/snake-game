<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <h1>🐍 Snake Game ver.2</h1>
    <div id="score-board">
      スコア: <span id="score">0</span>
      &nbsp;&nbsp;|&nbsp;&nbsp;
      ハイスコア: <span id="high-score">0</span>
    </div>
    <canvas id="game-canvas" width="400" height="400"></canvas>
    <div id="speed-control">
      速度:
      <button class="speed-btn active" data-speed="150">ふつう</button>
      <button class="speed-btn" data-speed="80">はやい</button>
      <button class="speed-btn" data-speed="40">とても速い</button>
    </div>
    <div id="message">スペースキーでスタート</div>
  </div>
  <script src="game.js"></script>
</body>
</html>
